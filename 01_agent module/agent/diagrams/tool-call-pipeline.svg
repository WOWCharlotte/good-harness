<svg xmlns="http://www.w3.org/2000/svg" width="980" height="300" viewBox="0 0 980 300" role="img" aria-labelledby="title desc">
  <title id="title">工具调用管线</title>
  <desc id="desc">展示 Agent 从意图到工具执行，再到反馈解释的工具调用流程。</desc>
  <defs>
    <style>
      .box { fill: #fff; stroke: #334155; stroke-width: 2; rx: 12; }
      .guard { fill: #fee2e2; stroke: #dc2626; stroke-width: 2; rx: 12; }
      .exec { fill: #dcfce7; stroke: #16a34a; stroke-width: 2; rx: 12; }
      .text { font-family: Arial, "Microsoft YaHei", sans-serif; fill: #0f172a; font-size: 16px; }
      .title { font-size: 20px; font-weight: 700; }
      .arrow { stroke: #475569; stroke-width: 2.5; marker-end: url(#arrow); fill: none; }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#475569"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="980" height="300" fill="#f8fafc"/>
  <text class="text title" x="32" y="42">工具调用不是函数调用，而是一条受控管线</text>
  <rect class="box" x="42" y="98" width="130" height="82"/>
  <text class="text" x="72" y="132">Agent</text>
  <text class="text" x="65" y="158">行动意图</text>
  <rect class="box" x="220" y="98" width="140" height="82"/>
  <text class="text" x="252" y="132">Tool Schema</text>
  <text class="text" x="250" y="158">参数验证</text>
  <rect class="guard" x="408" y="98" width="150" height="82"/>
  <text class="text" x="448" y="132">Permission</text>
  <text class="text" x="450" y="158">审批/拒绝</text>
  <rect class="exec" x="606" y="98" width="150" height="82"/>
  <text class="text" x="642" y="132">Runtime</text>
  <text class="text" x="634" y="158">沙箱执行</text>
  <rect class="box" x="804" y="98" width="136" height="82"/>
  <text class="text" x="837" y="132">Feedback</text>
  <text class="text" x="827" y="158">摘要/证据</text>
  <path class="arrow" d="M172 139 L220 139"/>
  <path class="arrow" d="M360 139 L408 139"/>
  <path class="arrow" d="M558 139 L606 139"/>
  <path class="arrow" d="M756 139 L804 139"/>
  <path class="arrow" d="M872 180 C840 254 180 254 110 180"/>
  <text class="text" x="420" y="246">错误、退出码、日志、diff、截图回到下一轮决策</text>
</svg>
